name: Support Site Pages

on:
  push:
    branches:
      - master
      - main
      - feature/ios-mvp
    paths:
      - support-site/**
      - .github/workflows/support-site-pages.yml
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy support site to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload support site
        uses: actions/upload-pages-artifact@v3
        with:
          path: support-site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
